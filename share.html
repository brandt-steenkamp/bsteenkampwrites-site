<section class="share-panel" aria-labelledby="share-heading">
  <h2 id="share-heading">Share this piece</h2>
  <p id="share-help">
    Share this post, or download the share image.
  </p>

  <div class="share-actions" aria-describedby="share-help">
    <a
      class="share-button share-button-x"
      data-share="x"
      href="#"
      rel="noopener noreferrer"
    >
      Share on X
    </a>

    <a
      class="share-button share-button-facebook"
      data-share="facebook"
      href="#"
      rel="noopener noreferrer"
    >
      Share on Facebook
    </a>

    <a
      class="share-button share-button-linkedin"
      data-share="linkedin"
      href="#"
      rel="noopener noreferrer"
    >
      Share on LinkedIn
    </a>

    <a
      class="share-button share-button-whatsapp"
      data-share="whatsapp"
      href="#"
      rel="noopener noreferrer"
    >
      Share on WhatsApp
    </a>

    <button
      class="share-button share-button-copy"
      data-share="copy"
      type="button"
    >
      Copy link
    </button>

    <a
      class="share-button share-button-download"
      data-share="download-image"
      href="#"
      download
    >
      Download share image
    </a>
  </div>

  <p class="share-status" id="share-status" aria-live="polite"></p>
</section>
